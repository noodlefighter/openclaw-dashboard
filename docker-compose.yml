version: "3.3"

services:
  openclaw-dashboard:
    build: .
    image: openclaw-dashboard:latest
    container_name: openclaw-dashboard
    restart: unless-stopped
    ports:
      - "3210:3210"
    environment:
      PORT: "3210"
      GW_HOST: "localhost"
      GW_PORT: "18789"
    volumes:
      - dashboard-data:/data
      - ../openclaw/config/openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ../openclaw/config/agents/main/sessions:/home/node/.openclaw/agents/main/sessions:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: host

volumes:
  dashboard-data:
